{{- if .Values.tls.internal.enabled }}
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: {{ include "wachd.fullname" . }}-server-tls
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "wachd.labels" . | nindent 4 }}
spec:
  secretName: {{ include "wachd.fullname" . }}-server-tls
  duration: {{ .Values.tls.internal.server.duration }}
  renewBefore: {{ .Values.tls.internal.server.renewBefore }}
  commonName: {{ include "wachd.fullname" . }}-server
  dnsNames:
    - {{ include "wachd.fullname" . }}-server
    - {{ include "wachd.fullname" . }}-server.{{ .Release.Namespace }}
    - {{ include "wachd.fullname" . }}-server.{{ .Release.Namespace }}.svc.cluster.local
  issuerRef:
    name: {{ .Values.certManager.issuerName }}
    kind: ClusterIssuer
    group: cert-manager.io
{{- end }}
