<!-- ══ STEP 1: INSTALL ══ -->
<rect x="16" y="12" width="648" height="80" rx="10" fill="#eeedfe" stroke="#7f77dd" stroke-width="1.5"/>
<text class="xl" x="340" y="38" text-anchor="middle" fill="#26215c">Step 1 — You (or customer) install one Helm chart</text>
<text class="md"  x="340" y="58" text-anchor="middle" fill="#3c3489">helm repo add yourtool https://charts.yourtool.io</text>
<text class="md"  x="340" y="76" text-anchor="middle" fill="#3c3489">helm install yourtool yourtool/yourtool -n yourtool --create-namespace</text>

<!-- Arrow -->
<line x1="340" y1="92" x2="340" y2="116" stroke="#7f77dd" stroke-width="2" marker-end="url(#ap)"/>
<text class="sm" x="356" y="108" fill="#7f77dd">runs on any k8s — AWS, Azure, GCP, on-prem, anywhere</text>

