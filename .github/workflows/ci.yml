name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  test:
    name: Test and Build
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: wachd
          POSTGRES_PASSWORD: wachd
          POSTGRES_DB: wachd
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4

      - name: Run go vet
        run: go vet ./...

      - name: Run tests
        env:
          DATABASE_URL: postgres://wachd:wachd@localhost:5432/wachd?sslmode=disable
          REDIS_URL: redis://localhost:6379
        run: go test ./...

      - name: Build server
        run: go build -o /tmp/wachd-server ./cmd/server

      - name: Build worker
        run: go build -o /tmp/wachd-worker ./cmd/worker

      - name: Build agent
        run: go build -o /tmp/wachd-agent ./cmd/agent

  publish:
    name: Publish Docker Image
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: read
      packages: write
      security-events: write

    steps:
      - uses: actions/checkout@v6

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build image for Trivy scan
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: wachd:scan
          labels: ${{ steps.meta.outputs.labels }}

      - name: Trivy scan — LOW / MEDIUM (report only)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: wachd:scan
          exit-code: '0'
          ignore-unfixed: true
          severity: LOW,MEDIUM
          format: sarif
          output: trivy-low.sarif

      - name: Upload LOW/MEDIUM results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always() && hashFiles('trivy-low.sarif') != ''
        with:
          sarif_file: trivy-low.sarif
          category: trivy-low-medium

      - name: Trivy scan — HIGH / CRITICAL (blocks push)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: wachd:scan
          exit-code: '1'
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          format: table

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Extract metadata — agent
        id: meta-agent
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}-agent
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build agent image for Trivy scan
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.agent
          push: false
          load: true
          tags: wachd-agent:scan
          labels: ${{ steps.meta-agent.outputs.labels }}

      - name: Trivy scan agent — LOW / MEDIUM (report only)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: wachd-agent:scan
          exit-code: '0'
          ignore-unfixed: true
          severity: LOW,MEDIUM
          format: sarif
          output: trivy-agent-low.sarif

      - name: Upload agent LOW/MEDIUM results to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always() && hashFiles('trivy-agent-low.sarif') != ''
        with:
          sarif_file: trivy-agent-low.sarif
          category: trivy-agent-low-medium

      - name: Trivy scan agent — HIGH / CRITICAL (blocks push)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: wachd-agent:scan
          exit-code: '1'
          ignore-unfixed: true
          severity: HIGH,CRITICAL
          format: table

      - name: Build and push agent image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: Dockerfile.agent
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta-agent.outputs.tags }}
          labels: ${{ steps.meta-agent.outputs.labels }}
